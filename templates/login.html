{% extends "layout.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="glass-card" style="width: 100%; max-width: 400px; text-align: center;">
        <h2 style="margin-bottom: 0.5rem;">Access Portal</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.9rem;">Sign in to your AXIOM account</p>
        
        <form action="/login" method="POST">
            <div style="margin-bottom: 1.5rem; text-align: left;">
                <label class="stat-label">Username</label><br>
                <input type="text" name="username" style="width: 100%; margin-top: 0.5rem; box-sizing: border-box;" placeholder="Username" required>
            </div>
            
            <div style="margin-bottom: 2rem; text-align: left;">
                <label class="stat-label">Password</label><br>
                <input type="password" name="password" style="width: 100%; margin-top: 0.5rem; box-sizing: border-box;" placeholder="Password" required>
            </div>

            <button type="submit" style="width: 100%;">AUTHENTICATE</button>
        </form>
    </div>
</div>
{% endblock %}
