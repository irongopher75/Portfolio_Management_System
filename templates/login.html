{% extends "layout.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="card" style="width: 100%; max-width: 420px; padding: 3rem;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="font-size: 0.75rem; color: var(--accent-primary); letter-spacing: 3px; font-weight: 800; text-transform: uppercase; margin-bottom: 0.5rem;">Security Protocol</div>
            <h1 style="font-size: 1.75rem; margin: 0;">AXIOM <span style="font-weight: 300; opacity: 0.6;">NODE</span></h1>
        </div>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 1px;">Access Identity</label>
                <input type="text" name="username" style="width: 100%; box-sizing: border-box;" placeholder="Enter username..." required>
            </div>
            <div style="margin-bottom: 2rem;">
                <label style="display: block; font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 1px;">Authorization Key</label>
                <input type="password" name="password" style="width: 100%; box-sizing: border-box;" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn" style="width: 100%; padding: 0.8rem;">INITIATE HANDSHAKE</button>
        </form>

        <div style="margin-top: 2rem; text-align: center; font-size: 0.8rem; color: var(--text-secondary);">
            New operative? <a href="{{ url_for('register') }}" style="color: var(--accent-secondary); text-decoration: none; font-weight: 600;">Request Credentials</a>
        </div>
    </div>
</div>
{% endblock %}
